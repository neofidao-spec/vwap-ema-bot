# ==========================================================================
# VWAP + EMA 9/21 Multi-Symbol Bot — Bitget USDT-Futures
# Risk: $1.0 per trade per symbol, leverage 15x, max SL loss $1 per pair
# Timeframe: 5m
# ==========================================================================

# All symbols are USDT-margined linear futures
symbols:
  - BTC/USDT:USDT
  - ETH/USDT:USDT
  - SHIB/USDT:USDT
  - XRP/USDT:USDT
  - ADA/USDT:USDT
  - DOGE/USDT:USDT
  - TRX/USDT:USDT
  - SOL/USDT:USDT
  - LINK/USDT:USDT
  - HYPE/USDT:USDT

margin_coin: "USDT"
product_type: "USDT-FUTURES"
timeframe: "5m"
lookback_bars: 200

# Account-wide rules
leverage: 15
risk_usd: 1.0          # max SL loss per pair (e.g. qty × SL_distance ≤ $1)
margin_usd: 1.0        # margin per entry position (notional = margin × leverage)
margin_mode: "cross"
max_open_positions: 3

# --- Strategy thresholds ---
strategy:
  ema_fast: 9
  ema_slow: 21
  rsi_period: 14
  rsi_long_min: 45
  rsi_long_max: 75
  rsi_short_min: 25
  rsi_short_max: 55
  volume_lookback: 20
  volume_spike_mult: 1.5
  pullback_atr_above_vwap: 0.5
  pullback_sl_atr_below_vwap: 1.0
  pullback_wick_min_pct: 0.40
  pullback_wick_short_pct: 0.40
  pullback_min_bars_above: 6
  breakout_atr_above_vwap: 0.5
  breakout_sl_atr: 1.5
  breakout_min_range_bars: 3
  breakout_max_range_bars: 6
  invalidation_vol_mult: 1.0
  tp1_atr_mult: 1.0
  tp1_size_pct: 0.40
  tp2_atr_mult: 2.0
  trail_atr_mult: 0.5
  trailing_mode: "ema9_or_atr_half"

# Optional: per-symbol overrides
symbol_overrides:
  SHIB/USDT:USDT:
    risk_usd: 0.5     # SHIB is volatile, cap max SL loss smaller
    margin_usd: 0.5
    leverage: 10
  HYPE/USDT:USDT:
    leverage: 10
  DOGE/USDT:USDT:
    leverage: 10

# --- Schedule ---
scheduler:
  enabled: true
  cron: "*/5 * * * *"
  log_file: "logs/vwap_bot.log"

# --- Execution ---
execution:
  order_type_entry: "limit"
  order_type_sl: "market"
  order_type_tp: "limit"
  entry_timeout_sec: 300
  poll_interval_sec: 30
  dry_run: true                       # true = paper, false = live

# --- Bitget API ---
bitget:
  api_key_env: "BITGET_API_KEY"
  api_secret_env: "BITGET_API_SECRET"
  api_passphrase_env: "BITGET_PASSPHRASE"
  base_url: "https://api.bitget.com"

# --- Notifications ---
telegram:
  enabled: false
